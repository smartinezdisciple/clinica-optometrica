name: CI — Clínica Optométrica

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
  pull_request:
    branches:
      - main
      - develop

# ── Variables globales ────────────────────────────────────────────────────────
env:
  NODE_VERSION: '20'

jobs:

  # ════════════════════════════════════════════════════════════════════
  # JOB 1: Lint — Validación de HTML y CSS
  # ════════════════════════════════════════════════════════════════════
  lint:
    name: 🔍 Lint HTML & CSS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Instalar dependencias
        run: npm ci

      - name: Lint HTML con HTMLHint
        run: npm run lint:html
        continue-on-error: false

      - name: Lint CSS con Stylelint
        run: npm run lint:css
        continue-on-error: true   # CSS warnings no bloquean

  # ════════════════════════════════════════════════════════════════════
  # JOB 2: Unit Tests — Jest (lógica de carrito, totales, descuentos)
  # ════════════════════════════════════════════════════════════════════
  unit-tests:
    name: 🧪 Unit Tests (Jest)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar tests unitarios con cobertura
        run: npm run test:unit

      - name: Subir reporte de cobertura
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  # ════════════════════════════════════════════════════════════════════
  # JOB 3: Integration Tests — Playwright (flujos de usuario)
  # ════════════════════════════════════════════════════════════════════
  integration-tests:
    name: 🎭 Integration Tests (Playwright)
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Instalar dependencias npm
        run: npm ci

      - name: Instalar navegadores Playwright
        run: npx playwright install --with-deps chromium

      - name: Ejecutar tests de integración
        run: npm run test:integration
        env:
          CI: true

      - name: Subir reporte Playwright
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Subir capturas de error (si existen)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-screenshots
          path: test-results/
          retention-days: 7

  # ════════════════════════════════════════════════════════════════════
  # JOB 4: Docs Generation — OpenAI GPT-4o
  # ════════════════════════════════════════════════════════════════════
  docs-generation:
    name: 📚 Generar Documentación (OpenAI)
    runs-on: ubuntu-latest
    needs: integration-tests
    # Solo corre en merges a develop o main (no en cada feature push)
    if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main'
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Instalar dependencias
        run: npm ci

      - name: Generar documentación con OpenAI
        run: node scripts/generate-docs.js
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Subir documentación generada como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: docs-generados
          path: docs/
          retention-days: 30

      - name: Commit y push de documentación actualizada
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'docs: actualización automática por OpenAI [skip ci]'
          file_pattern: 'docs/**'
          commit_user_name: 'github-actions[bot]'
          commit_user_email: 'github-actions[bot]@users.noreply.github.com'
